<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarFront | Tactical Conquest</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- SVG Icon Sprite -->
    <svg style="display: none;">
        <symbol id="icon-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
        </symbol>
        <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"></path>
        </symbol>
        <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </symbol>
        <symbol id="icon-skull" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a8 8 0 0 0-8 8c0 3.18 1.83 5.92 4.5 7.15V22h7v-4.85c2.67-1.23 4.5-3.97 4.5-7.15a8 8 0 0 0-8-8zm-3 8a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm6 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm-3 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/>
        </symbol>
        <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M6 9l6 6 6-6"></path>
        </symbol>
    </svg>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <!-- Main Menu -->
            <div id="main-menu" class="glass-panel menu-screen">
                <h1>WarFront</h1>
                
                <div class="input-group">
                    <input type="text" id="nickname-input" placeholder="Soldier Name" maxlength="15">
                    <div id="nickname-error" class="error-msg" style="display: none;">Veuillez entrer un pseudo</div>
                </div>

                <div class="config-section">
                    <h3>Game Mode</h3>
                    <div id="mode-selection" class="grid-options" style="grid-template-columns: 1fr;">
                        <div class="option-card selected" data-mode="solo">SOLO CONQUEST</div>
                    </div>
                </div>

                <div class="menu-options" style="margin-top: 1rem;">
                    <button id="lancer-btn" class="primary-btn">LANCER</button>
                </div>
            </div>

            <!-- Configuration Step (Detailed Sections) -->
            <div id="solo-config" class="glass-panel menu-screen wide" style="display: none;">
                <div class="menu-header">
                    <button class="back-btn">←</button>
                    <h2>Mission Intel</h2>
                </div>
                
                <!-- Carte Section -->
                <div class="config-section accordion-section active" data-section="map">
                    <div class="section-title">
                        <div class="title-left">
                            <div class="icon-box blue"><svg><use href="#icon-pencil"></use></svg></div>
                            <span>CARTE</span>
                        </div>
                        <svg class="chevron"><use href="#icon-chevron"></use></svg>
                    </div>
                    <div class="section-content">
                        <div id="map-selection" class="grid-options" style="grid-template-columns: repeat(4, 1fr);"></div>
                    </div>
                </div>

                <!-- Difficulté Section -->
                <div id="ai-section" class="config-section accordion-section" data-section="ai">
                    <div class="section-title">
                        <div class="title-left">
                            <div class="icon-box green"><svg><use href="#icon-arrow"></use></svg></div>
                            <span>DIFFICULTÉ DES NATIONS</span>
                        </div>
                        <svg class="chevron"><use href="#icon-chevron"></use></svg>
                    </div>
                    <div class="section-content">
                        <div id="ai-selection" class="grid-options" style="grid-template-columns: repeat(4, 1fr);"></div>
                    </div>
                </div>

                <!-- Mode Section -->
                <div class="config-section accordion-section" data-section="mode">
                    <div class="section-title">
                        <div class="title-left">
                            <div class="icon-box purple"><svg><use href="#icon-book"></use></svg></div>
                            <span>MODE</span>
                        </div>
                        <svg class="chevron"><use href="#icon-chevron"></use></svg>
                    </div>
                    <div class="section-content">
                        <div id="game-mode-selection" class="grid-options" style="grid-template-columns: repeat(2, 1fr);">
                            <div class="option-card wide-card selected" data-game-mode="ffa">
                                <span>CHACUN POUR SOI</span>
                            </div>
                            <div class="option-card wide-card" data-game-mode="teams">
                                <span>ÉQUIPES</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: center; margin-top: 1rem;">
                    <button id="start-solo-btn" class="primary-btn" style="width: 200px;">ENGAGE</button>
                </div>
            </div>

            <div id="hud" style="display: none;">
                <div class="stats glass-panel">
                    <div id="player-status">
                        <span class="color-dot"></span>
                        <span id="player-name"></span>
                    </div>
                    <div id="room-info">Room: <span id="room-display"></span></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 WarFront Command - Tactical Conquest MVP</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
